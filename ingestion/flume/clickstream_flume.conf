# ============================================================
# FILE: ingestion/flume/clickstream_flume.conf
# PURPOSE: Ingest real-time clickstream events Kafka -> HDFS
# ============================================================

clickstream_agent.sources  = kafka_source
clickstream_agent.sinks    = hdfs_sink
clickstream_agent.channels = file_channel

# SOURCE
clickstream_agent.sources.kafka_source.type                        = org.apache.flume.source.kafka.KafkaSource
clickstream_agent.sources.kafka_source.kafka.bootstrap.servers     = localhost:9092
clickstream_agent.sources.kafka_source.kafka.topics                = clickstream
clickstream_agent.sources.kafka_source.kafka.consumer.group.id     = flume_clickstream_group
clickstream_agent.sources.kafka_source.channels                    = file_channel
clickstream_agent.sources.kafka_source.batchSize                   = 1000
clickstream_agent.sources.kafka_source.batchDurationMillis         = 1000

# CHANNEL
clickstream_agent.channels.file_channel.type           = file
clickstream_agent.channels.file_channel.checkpointDir  = /tmp/flume_checkpoint/clickstream
clickstream_agent.channels.file_channel.dataDirs       = /tmp/flume_data/clickstream
clickstream_agent.channels.file_channel.capacity       = 100000

# SINK
clickstream_agent.sinks.hdfs_sink.type                         = hdfs
clickstream_agent.sinks.hdfs_sink.channel                      = file_channel
clickstream_agent.sinks.hdfs_sink.hdfs.path                    = hdfs://namenode:9000/data/raw/clickstream/%Y/%m/%d/%H/
clickstream_agent.sinks.hdfs_sink.hdfs.filePrefix              = click-
clickstream_agent.sinks.hdfs_sink.hdfs.fileSuffix              = .json
clickstream_agent.sinks.hdfs_sink.hdfs.fileType                = DataStream
clickstream_agent.sinks.hdfs_sink.hdfs.writeFormat             = Text
clickstream_agent.sinks.hdfs_sink.hdfs.rollInterval            = 300
clickstream_agent.sinks.hdfs_sink.hdfs.rollSize                = 67108864
clickstream_agent.sinks.hdfs_sink.hdfs.rollCount               = 0
clickstream_agent.sinks.hdfs_sink.hdfs.useLocalTimeStamp       = true
clickstream_agent.sinks.hdfs_sink.hdfs.batchSize               = 1000

# HOW TO RUN:
# flume-ng agent --conf /etc/flume/conf \
#   --conf-file ingestion/flume/clickstream_flume.conf \
#   --name clickstream_agent -Dflume.root.logger=INFO,console